<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>교량 InSAR 위성 변위 분석 — VWorld 연동 예제</title>
<!-- OpenLayers(= VWorld 2.0 API 기반) + Chart.js. Bmaps 통합 시엔 Bmaps 의 VWorld 인스턴스 재사용. -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.2.1/ol.css" />
<script src="https://cdn.jsdelivr.net/npm/ol@10.2.1/dist/ol.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  body { font-family: "Malgun Gothic", system-ui, sans-serif; margin: 0; color: #222; }
  header { display: flex; align-items: center; gap: 14px; padding: 10px 16px; background: #f4f6f9; border-bottom: 1px solid #dde; flex-wrap: wrap; }
  header h1 { font-size: 16px; margin: 0; }
  .badge { padding: 4px 12px; border-radius: 14px; color: #fff; font-weight: 700; font-size: 13px; }
  select, button, input[type=text] { padding: 5px 8px; font-size: 13px; }
  .meta { font-size: 13px; color: #555; }
  .err { color: #c62828; font-size: 13px; }
  .controls { display: flex; gap: 10px; align-items: center; padding: 6px 12px; background: #fafbfc; border-bottom: 1px solid #eee; flex-wrap: wrap; }
  main { display: grid; grid-template-columns: 1fr 380px; grid-template-rows: 1fr 220px; height: calc(100vh - 96px); }
  #map { grid-row: 1 / 3; position: relative; }
  #side { padding: 12px; border-left: 1px solid #dde; overflow: auto; }
  #trend { grid-column: 1; padding: 8px 12px; border-top: 1px solid #dde; }
  .hint { color: #888; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>🛰️ 교량 InSAR 위성 변위 분석 (VWorld)</h1>
  <label class="meta">VWorld 키 <input type="text" id="vwKey" size="22" placeholder="vworld apiKey" /></label>
  <select id="vwLayer">
    <option value="base">일반지도</option>
    <option value="satellite">위성영상</option>
    <option value="hybrid">하이브리드</option>
    <option value="gray">회색</option>
  </select>
  <button id="initBtn">지도 시작</button>
  <select id="bridgeSel"></select>
  <span id="warnBadge" class="badge" style="background:#888">—</span>
  <span id="summary" class="meta"></span>
  <span id="err" class="err"></span>
</header>

<div class="controls">
  지표:
  <select id="metricSel"><option value="los">LOS 변위</option><option value="longitudinal">종방향 변위</option></select>
  색상:
  <select id="colorSel"><option value="cri">CRI(공명위험)</option><option value="value">변위 크기</option></select>
  시점: <input type="range" id="dateSlider" min="0" value="0" step="1" />
  <span id="dateLabel" class="meta"></span>
  <span style="flex:1"></span>
  <a id="csvLink" href="#" download>변위 CSV</a>
  <button id="vlmBtn" type="button">VLM 패키지(.zip)</button>
</div>

<main>
  <div id="map"></div>
  <div id="side">
    <div class="hint">지도의 측점을 클릭하면 시계열이 여기 표시됩니다.</div>
    <h3 id="ptTitle" style="display:none"></h3>
    <canvas id="ptChart" height="220"></canvas>
    <div id="ptMeta" class="meta"></div>
  </div>
  <div id="trend"><canvas id="criChart"></canvas></div>
</main>

<script type="module">
import { InframonClient, WARNING_COLORS } from "./inframon-client.js";
import { createVWorldMap, InsarPointLayer } from "./vworld-adapter.js";

// ── 설정 ───────────────────────────────────────────────────────
const API_BASE = "http://127.0.0.1:8000";   // inframon --serve-api 주소
// VWorld apiKey 는 화면 상단 입력칸에서. (없으면 베이스맵 타일은 안 뜨고 측점만 표시)
// ───────────────────────────────────────────────────────────────

const api = new InframonClient(API_BASE);
const $ = (id) => document.getElementById(id);
const showErr = (e) => { $("err").textContent = e ? `⚠ ${e.message ?? e}` : ""; };

let map, ptLayer, ptChart, criChart;
const state = { bridgeId: null, dates: [], dateIndex: 0 };

$("initBtn").onclick = startMap;

function startMap() {
  try {
    if (map) map.setTarget(null);
    map = createVWorldMap("map", { apiKey: $("vwKey").value.trim(), layer: $("vwLayer").value });
    ptLayer = new InsarPointLayer(map, { onPick: loadSeries });
    initData();
  } catch (e) { showErr(e); }
}

async function initData() {
  try {
    const bridges = await api.listBridges();
    const sel = $("bridgeSel");
    sel.innerHTML = "";
    bridges.filter((b) => b.has_insar).forEach((b) => {
      const o = document.createElement("option");
      o.value = b.bridge_id; o.textContent = `${b.name} (${b.warning_level ?? "—"})`;
      sel.appendChild(o);
    });
    if (!sel.value) { showErr({ message: "InSAR 산출물이 있는 교량이 없습니다." }); return; }
    sel.onchange = () => loadBridge(sel.value);
    $("metricSel").onchange = refreshPoints;
    $("colorSel").onchange = refreshPoints;
    $("dateSlider").oninput = (e) => { state.dateIndex = +e.target.value; refreshPoints(); };
    await loadBridge(sel.value);
  } catch (e) { showErr(e); }
}

async function loadBridge(bridgeId) {
  showErr(null);
  state.bridgeId = bridgeId;
  // KAIA 핸드오프 다운로드 — 현재 교량에 맞춰 갱신.
  $("csvLink").href = api.exportCsvUrl(bridgeId);
  $("vlmBtn").onclick = async () => {
    try {
      const blob = await api.vlmPackageBlob(bridgeId, { figures: true });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `${bridgeId}_vlm_package.zip`; a.click();
      URL.revokeObjectURL(url);
    } catch (e) { showErr(e); }
  };
  try {
    const [summary, cri] = await Promise.all([api.summary(bridgeId), api.cri(bridgeId)]);
    const w = summary.warning?.level ?? "—";
    $("warnBadge").textContent = w;
    $("warnBadge").style.background = WARNING_COLORS[w] ?? "#888";
    $("summary").textContent =
      `측점 ${summary.n_points} · 시점 ${summary.n_dates} · 기간 ${summary.date_range.join(" ~ ")}` +
      ` · 최대CRI ${summary.cri_global_max ?? "-"} · coherence ${summary.coherence_mean}`;
    state.dates = cri.dates;
    state.dateIndex = cri.dates.length - 1;
    $("dateSlider").max = cri.dates.length - 1; $("dateSlider").value = state.dateIndex;
    drawCri(cri);
    await refreshPoints();
  } catch (e) { showErr(e); }
}

async function refreshPoints() {
  $("dateLabel").textContent = state.dates[state.dateIndex] ?? "";
  try {
    const data = await api.points(state.bridgeId, { metric: $("metricSel").value, date: state.dateIndex });
    const { rendered, skipped } = ptLayer.update(data.points, { colorBy: $("colorSel").value });
    if (rendered > 0) ptLayer.fit();
    if (skipped > 0 && rendered === 0)
      showErr({ message: `측점 ${skipped}개가 위경도 범위를 벗어남(데모용 임의 좌표일 수 있음). 실데이터·올바른 SRS에서 정상 표시.` });
    else showErr(null);
  } catch (e) { showErr(e); }
}

async function loadSeries(pointId) {
  try {
    const s = await api.series(state.bridgeId, pointId);
    $("ptTitle").style.display = "block";
    $("ptTitle").textContent = `측점 #${pointId} (${s.member})`;
    const ds = [
      { label: "LOS (mm)", data: s.los_mm, borderColor: "#1565c0", tension: 0.2 },
      { label: "종방향 (mm)", data: s.longitudinal_mm, borderColor: "#6a1b9a", tension: 0.2 },
    ];
    if (s.vertical_mm) ds.push({ label: "연직 (mm)", data: s.vertical_mm, borderColor: "#2e7d32", tension: 0.2 });
    if (s.cri) ds.push({ label: "CRI", data: s.cri, borderColor: "#c62828", yAxisID: "y1", tension: 0.2 });
    ptChart?.destroy();
    ptChart = new Chart($("ptChart"), {
      type: "line", data: { labels: s.dates, datasets: ds },
      options: { interaction: { mode: "index" },
        scales: { y: { title: { display: true, text: "변위(mm)" } },
          y1: { position: "right", min: 0, max: 1, grid: { drawOnChartArea: false }, title: { display: true, text: "CRI" } } } },
    });
    $("ptMeta").textContent = s.EI != null ? `절대 강성 EI ≈ ${s.EI.toExponential(2)} · α ≈ ${s.alpha?.toExponential(2)}` : "";
  } catch (e) { showErr(e); }
}

function drawCri(cri) {
  criChart?.destroy();
  criChart = new Chart($("criChart"), {
    type: "line",
    data: { labels: cri.dates, datasets: [{ label: "시점별 최대 CRI", data: cri.cri_max_series,
      borderColor: "#c62828", backgroundColor: "rgba(198,40,40,.1)", fill: true, tension: 0.2 }] },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 1 } },
      plugins: { title: { display: true, text: "CRI 추세(전체 측점 최대)" } } },
  });
}
</script>
</body>
</html>
